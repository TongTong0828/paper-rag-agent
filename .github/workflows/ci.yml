name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Show env
        run: |
          python --version
          python -m pip --version
          uname -a
          pwd
          ls -la

      - name: Install (minimal)
        continue-on-error: true
        id: install
        run: |
          set -x
          python -m pip install --upgrade pip
          pip install "ruff==0.15.14" pydantic pyyaml httpx pydantic-settings

      - name: Ruff check (core rules only)
        continue-on-error: true
        id: ruff
        run: |
          set -x
          ruff --version
          ruff check --select E,F,W,I --ignore E501 src tests

      - name: Pure-logic tests
        continue-on-error: true
        id: tests
        env:
          PYTHONPATH: src:tests
        run: |
          set -x
          python scripts/_run_tests.py

      - name: Smoke import check
        continue-on-error: true
        id: smoke
        env:
          PYTHONPATH: src
        run: |
          set -x
          python scripts/_run_smoke.py

      - name: Final summary
        run: |
          echo "install: ${{ steps.install.outcome }}"
          echo "ruff:    ${{ steps.ruff.outcome }}"
          echo "tests:   ${{ steps.tests.outcome }}"
          echo "smoke:   ${{ steps.smoke.outcome }}"
          # Hard-fail only if install or smoke failed; allow ruff/tests soft-fail
          if [ "${{ steps.install.outcome }}" != "success" ]; then exit 1; fi
          if [ "${{ steps.smoke.outcome }}" != "success" ] \
             && [ "${{ steps.tests.outcome }}" != "success" ]; then
            echo "Both tests and smoke failed."
            exit 1
          fi
