# DeerFlow observability stack — Prometheus + Grafana
# Usage:
#   cd docker
#   docker compose -f docker-compose.yaml -f observability/docker-compose.observability.yaml up -d
#
# Access:
#   Prometheus  http://localhost:9090
#   Grafana     http://localhost:3001  (admin / admin on first login)
#
# Both attach to the existing `deer-flow` network so they can scrape
# gateway:8001 and qdrant:6333 by service name.

services:
  prometheus:
    image: prom/prometheus:v2.55.0
    container_name: deer-flow-prometheus
    restart: unless-stopped
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    networks:
      - deer-flow
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/ready"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 10s

  grafana:
    image: grafana/grafana:11.3.0
    container_name: deer-flow-grafana
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
      # Auto-load provisioned datasources + dashboards
      - GF_PATHS_PROVISIONING=/etc/grafana/provisioning
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - deer-flow
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q ok"]
      interval: 15s
      timeout: 3s
      retries: 5
      start_period: 15s

networks:
  deer-flow:
    external: true
    name: docker_deer-flow

volumes:
  prometheus_data:
  grafana_data:
